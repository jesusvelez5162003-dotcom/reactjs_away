<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="lanternBeam" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#020a05" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bigBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Dark interior room (abandoned industrial building) -->
  <rect width="800" height="500" fill="#030a06"/>

  <!-- Back wall texture -->
  <!-- Bricks far -->
  <rect x="100" y="0" width="98" height="35" fill="#050d08" opacity="0.5"/>
  <rect x="200" y="0" width="98" height="35" fill="#040b07" opacity="0.5"/>
  <rect x="300" y="0" width="98" height="35" fill="#050d08" opacity="0.5"/>
  <rect x="400" y="0" width="98" height="35" fill="#040b07" opacity="0.5"/>
  <rect x="500" y="0" width="98" height="35" fill="#050d08" opacity="0.5"/>
  <rect x="600" y="0" width="98" height="35" fill="#040b07" opacity="0.5"/>
  <rect x="50" y="37" width="98" height="35" fill="#040b07" opacity="0.4"/>
  <rect x="150" y="37" width="98" height="35" fill="#050d08" opacity="0.4"/>
  <rect x="250" y="37" width="98" height="35" fill="#040b07" opacity="0.4"/>
  <rect x="350" y="37" width="98" height="35" fill="#050d08" opacity="0.4"/>
  <rect x="450" y="37" width="98" height="35" fill="#040b07" opacity="0.4"/>
  <rect x="550" y="37" width="98" height="35" fill="#050d08" opacity="0.4"/>
  <rect x="650" y="37" width="100" height="35" fill="#040b07" opacity="0.4"/>

  <!-- Floor -->
  <rect x="0" y="410" width="800" height="90" fill="#040c08"/>
  <rect x="0" y="410" width="800" height="3" fill="#071609" opacity="0.6"/>
  <!-- Floor boards -->
  <rect x="0" y="420" width="800" height="1" fill="#071609" opacity="0.3"/>
  <rect x="0" y="440" width="800" height="1" fill="#071609" opacity="0.3"/>
  <rect x="100" y="410" width="1" height="90" fill="#071609" opacity="0.25"/>
  <rect x="250" y="410" width="1" height="90" fill="#071609" opacity="0.25"/>
  <rect x="400" y="410" width="1" height="90" fill="#071609" opacity=" 0.25"/>
  <rect x="550" y="410" width="1" height="90" fill="#071609" opacity="0.25"/>
  <rect x="700" y="410" width="1" height="90" fill="#071609" opacity="0.25"/>

  <!-- Left wall + shelf/furniture -->
  <rect x="0" y="0" width="70" height="500" fill="#040b07"/>
  <rect x="65" y="0" width="10" height="500" fill="#050f09"/>
  <!-- Shelf -->
  <rect x="0" y="240" width="80" height="10" fill="#0a1a0e"/>
  <rect x="10" y="252" width="15" height="12" fill="#081508"/>
  <rect x="32" y="250" width="10" height="14" fill="#081508"/>
  <!-- Jars on shelf (creepy collection) -->
  <rect x="12" y="218" width="12" height="24" rx="2" fill="#061009"/>
  <rect x="13" y="220" width="10" height="12" rx="1" fill="#10b981" opacity="0.15"/>
  <rect x="35" y="222" width="10" height="18" rx="2" fill="#061009"/>
  <rect x="36" y="224" width="8" height="10" rx="1" fill="#10b981" opacity="0.1"/>

  <!-- Right wall + cages -->
  <rect x="730" y="0" width="70" height="500" fill="#040b07"/>
  <rect x="725" y="0" width="10" height="500" fill="#050f09"/>
  <!-- Cage hanging right -->
  <rect x="740" y="120" width="40" height="50" fill="none" stroke="#0c1e12" stroke-width="3"/>
  <rect x="740" y="130" width="40" height="1" fill="#0c1e12" opacity="0.5"/>
  <rect x="740" y="140" width="40" height="1" fill="#0c1e12" opacity="0.5"/>
  <rect x="740" y="150" width="40" height="1" fill="#0c1e12" opacity="0.5"/>
  <rect x="756" y="120" width="1" height="50" fill="#0c1e12" opacity="0.5"/>
  <rect x="766" y="120" width="1" height="50" fill="#0c1e12" opacity="0.5"/>
  <rect x="759" y="100" width="2" height="22" fill="#0c1e12"/>
  <!-- Inside cage (something small) -->
  <rect x="750" y="140" width="6" height="16" rx="2" fill="#040c07"/>
  <ellipse cx="753" cy="138" rx="4" ry="5" fill="#040c07"/>

  <!-- Lantern beam cone (coming from creature's hand) -->
  <rect width="800" height="500" fill="url(#lanternBeam)"/>

  <!-- THE COLECCIONISTA DE SOMBRAS - Giant humanoid with long arms -->
  <!-- SHADOW/BODY -->
  <!-- Giant shadow on wall -->
  <ellipse cx="400" cy="250" rx="200" ry="300" fill="#000" opacity="0.3" filter="url(#bigBlur)"/>

  <!-- Left arm (extremely long, reaching toward ground) -->
  <path d="M 330 200 Q 200 280 100 400" fill="none" stroke="#071209" stroke-width="28" stroke-linecap="round"/>
  <path d="M 330 200 Q 200 280 100 400" fill="none" stroke="#091609" stroke-width="20" stroke-linecap="round"/>
  <!-- Left hand (large, clawing) -->
  <ellipse cx="105" cy="405" rx="22" ry="16" fill="#071209"/>
  <!-- Left fingers -->
  <rect x="80" y="392" width="8" height="30" rx="3" fill="#081409" transform="rotate(-20, 84, 407)"/>
  <rect x="92" y="390" width="8" height="32" rx="3" fill="#071209" transform="rotate(-8, 96, 406)"/>
  <rect x="108" y="390" width="8" height="28" rx="3" fill="#081409" transform="rotate(5, 112, 404)"/>
  <rect x="122" y="394" width="8" height="24" rx="3" fill="#071209" transform="rotate(15, 126, 406)"/>

  <!-- Right arm (bent at odd angle, holding the lantern) -->
  <path d="M 470 200 Q 580 240 560 310" fill="none" stroke="#071209" stroke-width="26" stroke-linecap="round"/>
  <path d="M 470 200 Q 580 240 560 310" fill="none" stroke="#091609" stroke-width="18" stroke-linecap="round"/>
  <!-- Right hand holding lantern -->
  <ellipse cx="558" cy="318" rx="18" ry="14" fill="#071209"/>
  <!-- Lantern -->
  <rect x="545" y="288" width="28" height="36" rx="3" fill="#0c1e12" stroke="#10b981" stroke-width="1.5"/>
  <rect x="550" y="277" width="18" height="14" rx="2" fill="#0c1e12"/>
  <rect x="556" y="268" width="6" height="12" fill="#0c1e12"/>
  <!-- Lantern glass (glowing green) -->
  <rect x="549" y="292" width="20" height="24" rx="2" fill="#10b981" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="559" cy="304" rx="22" ry="22" fill="#10b981" opacity="0.3" filter="url(#bigBlur)"/>
  <!-- Lantern beam (cone pointing down-left) -->
  <polygon points="549,316 540,416 510,416" fill="#10b981" opacity="0.08"/>
  <polygon points="549,316 535,416 520,416" fill="#10b981" opacity="0.06"/>

  <!-- TORSO (large, hunched) -->
  <rect x="320" y="140" width="160" height="200" rx="20" fill="#071209"/>
  <rect x="334" y="154" width="132" height="180" rx="16" fill="#091609"/>
  <!-- Spine/back ridges -->
  <rect x="394" y="160" width="12" height="20" rx="4" fill="#0c1e12"/>
  <rect x="396" y="184" width="8" height="16" rx="3" fill="#0c1e12"/>
  <rect x="397" y="204" width="6" height="14" rx="3" fill="#0c1e12"/>
  <rect x="397" y="222" width="6" height="12" rx="3" fill="#0c1e12"/>

  <!-- Neck -->
  <rect x="372" y="90" width="56" height="54" rx="10" fill="#081408"/>

  <!-- HEAD (large, sunken, with no eyes or a disturbing face) -->
  <ellipse cx="400" cy="80" rx="68" ry="60" fill="#071209"/>
  <ellipse cx="400" cy="72" rx="58" ry="52" fill="#091609"/>
  <!-- Face - no visible eyes, just two deep hollow sockets -->
  <ellipse cx="374" cy="70" rx="18" ry="14" fill="#040b07"/>
  <ellipse cx="426" cy="70" rx="18" ry="14" fill="#040b07"/>
  <ellipse cx="374" cy="70" rx="12" ry="9" fill="#020605"/>
  <ellipse cx="426" cy="70" rx="12" ry="9" fill="#020605"/>
  <!-- Stitched/sewn mouth -->
  <rect x="380" y="96" width="40" height="4" rx="2" fill="#040b07"/>
  <rect x="388" y="92" width="4" height="12" fill="#040b07"/>
  <rect x="400" y="92" width="4" height="12" fill="#040b07"/>
  <!-- Hat (worn, wide brim) -->
  <rect x="340" y="25" width="120" height="28" rx="4" fill="#060f09"/>
  <rect x="360" y="10" width="80" height="20" rx="6" fill="#071209"/>

  <!-- Legs (long, stick-like) -->
  <rect x="355" y="336" width="30" height="74" rx="6" fill="#071209"/>
  <rect x="415" y="336" width="30" height="74" rx="6" fill="#071209"/>
  <!-- Feet (elongated, claw-like) -->
  <ellipse cx="370" cy="415" rx="28" ry="10" fill="#060f08"/>
  <ellipse cx="430" cy="415" rx="28" ry="10" fill="#060f08"/>

  <!-- Ambient dust/particles in the light -->
  <rect x="420" y="340" width="2" height="2" fill="#10b981" opacity="0.4"/>
  <rect x="440" y="360" width="2" height="2" fill="#10b981" opacity="0.3"/>
  <rect x="410" y="380" width="2" height="2" fill="#10b981" opacity="0.35"/>
  <rect x="460" y="320" width="2" height="2" fill="#10b981" opacity="0.25"/>
</svg>
