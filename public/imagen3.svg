<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="cellGlow1" cx="32%" cy="62%" r="14%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020a05" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cellGlow2" cx="50%" cy="62%" r="14%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020a05" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cellGlow3" cx="68%" cy="62%" r="14%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#020a05" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background - abandoned room, dark stone -->
  <rect width="800" height="500" fill="#040b07"/>

  <!-- Stone tile floor -->
  <rect x="0" y="390" width="800" height="110" fill="#06100a"/>
  <!-- Floor tile lines -->
  <rect x="0" y="390" width="800" height="2" fill="#04080a" opacity="0.8"/>
  <rect x="0" y="430" width="800" height="1" fill="#04080a" opacity="0.5"/>
  <rect x="0" y="460" width="800" height="1" fill="#04080a" opacity="0.5"/>
  <rect x="100" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="200" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="300" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="400" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="500" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="600" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>
  <rect x="700" y="390" width="1" height="110" fill="#04080a" opacity="0.4"/>

  <!-- Cell glows on floor -->
  <rect width="800" height="500" fill="url(#cellGlow1)"/>
  <rect width="800" height="500" fill="url(#cellGlow2)"/>
  <rect width="800" height="500" fill="url(#cellGlow3)"/>

  <!-- Stone walls with ancient carvings -->
  <!-- Left wall section -->
  <rect x="0" y="0" width="100" height="500" fill="#050c08"/>
  <rect x="95" y="0" width="8" height="500" fill="#071109"/>
  <!-- Carved pattern -->
  <rect x="20" y="80" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="20" y="120" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="20" y="160" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="30" y="90" width="4" height="70" fill="#0a1810" opacity="0.4"/>
  <rect x="60" y="90" width="4" height="70" fill="#0a1810" opacity="0.4"/>

  <!-- Right wall section -->
  <rect x="700" y="0" width="100" height="500" fill="#050c08"/>
  <rect x="697" y="0" width="8" height="500" fill="#071109"/>
  <!-- Carved pattern right -->
  <rect x="720" y="80" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="720" y="120" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="720" y="160" width="60" height="4" fill="#0a1810" opacity="0.6"/>
  <rect x="730" y="90" width="4" height="70" fill="#0a1810" opacity="0.4"/>
  <rect x="760" y="90" width="4" height="70" fill="#0a1810" opacity="0.4"/>

  <!-- Ceiling arches (pixel style) -->
  <rect x="100" y="0" width="600" height="50" fill="#040b07"/>
  <path d="M100 50 Q400 0 700 50" fill="#040b07" stroke="#071109" stroke-width="3"/>
  <!-- Ceiling drips/cracks -->
  <rect x="200" y="0" width="2" height="60" fill="#071109" opacity="0.5"/>
  <rect x="380" y="0" width="2" height="40" fill="#071109" opacity="0.4"/>
  <rect x="560" y="0" width="2" height="70" fill="#071109" opacity="0.5"/>

  <!-- ANCIENT ÉTER MECHANISM (center background) -->
  <!-- Main panel/console frame -->
  <rect x="180" y="90" width="440" height="290" rx="4" fill="#061009" stroke="#0c1e10" stroke-width="3"/>
  <rect x="185" y="95" width="430" height="280" rx="3" fill="#050d07"/>
  <!-- Panel border details -->
  <rect x="183" y="108" width="4" height="254" fill="#0a1e0e"/>
  <rect x="613" y="108" width="4" height="254" fill="#0a1e0e"/>
  <rect x="196" y="93" width="408" height="4" fill="#0a1e0e"/>
  <rect x="196" y="369" width="408" height="4" fill="#0a1e0e"/>
  <!-- Corner details -->
  <rect x="183" y="93" width="14" height="14" fill="#0c2010"/>
  <rect x="603" y="93" width="14" height="14" fill="#0c2010"/>
  <rect x="183" y="360" width="14" height="14" fill="#0c2010"/>
  <rect x="603" y="360" width="14" height="14" fill="#0c2010"/>

  <!-- ÉTER ENERGY CELLS (3 large hexagonal nodes) -->
  <!-- Cell 1 (Left, fully charged) -->
  <rect x="220" y="230" width="80" height="80" rx="6" fill="#071609" stroke="#10b981" stroke-width="2.5"/>
  <rect x="228" y="238" width="64" height="64" rx="4" fill="#0a1e0c"/>
  <!-- Inner glow -->
  <rect x="236" y="246" width="48" height="48" rx="3" fill="#10b981" opacity="0.15"/>
  <rect x="244" y="254" width="32" height="32" rx="2" fill="#10b981" opacity="0.25"/>
  <!-- Éter symbol -->
  <rect x="256" y="262" width="8" height="16" fill="#34d399" opacity="0.9" filter="url(#glow)"/>
  <rect x="252" y="266" width="16" height="8" fill="#34d399" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="260" cy="270" rx="18" ry="18" fill="#10b981" opacity="0.2" filter="url(#softBlur)"/>
  <!-- CHARGED label -->
  <rect x="228" y="316" width="64" height="8" rx="2" fill="#10b981" opacity="0.5"/>

  <!-- Cell 2 (Center, partially charged) -->
  <rect x="360" y="230" width="80" height="80" rx="6" fill="#071609" stroke="#10b981" stroke-width="2.5" stroke-dasharray="6,4"/>
  <rect x="368" y="238" width="64" height="64" rx="4" fill="#0a1e0c"/>
  <rect x="376" y="246" width="48" height="32" rx="3" fill="#10b981" opacity="0.12"/>
  <rect x="384" y="262" width="32" height="16" rx="2" fill="#10b981" opacity="0.2"/>
  <!-- Partial symbol -->
  <rect x="396" y="268" width="8" height="12" fill="#059669" opacity="0.6"/>
  <rect x="392" y="272" width="16" height="6" fill="#059669" opacity="0.6"/>
  <ellipse cx="400" cy="274" rx="14" ry="10" fill="#059669" opacity="0.15" filter="url(#softBlur)"/>
  <!-- PARTIAL label -->
  <rect x="368" y="316" width="44" height="8" rx="2" fill="#059669" opacity="0.35"/>

  <!-- Cell 3 (Right, empty) -->
  <rect x="500" y="230" width="80" height="80" rx="6" fill="#071609" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  <rect x="508" y="238" width="64" height="64" rx="4" fill="#050d07"/>
  <!-- Broken/empty indicator -->
  <rect x="530" y="260" width="20" height="4" fill="#0a1e0c"/>
  <rect x="540" y="252" width="4" height="20" fill="#0a1e0c"/>
  <!-- Empty label (faint) -->
  <rect x="516" y="316" width="40" height="8" rx="2" fill="#071609" opacity="0.4"/>

  <!-- Wire connections between cells (Éter flow) -->
  <rect x="300" y="268" width="60" height="4" fill="#10b981" opacity="0.4"/>
  <rect x="308" y="264" width="2" height="12" fill="#10b981" opacity="0.6" filter="url(#glow)"/>
  <rect x="440" y="268" width="60" height="4" fill="#10b981" opacity="0.15"/>
  <!-- Flow indicator pulse dots -->
  <rect x="316" y="266" width="4" height="4" rx="1" fill="#34d399" opacity="0.8"/>
  <rect x="330" y="266" width="4" height="4" rx="1" fill="#34d399" opacity="0.6"/>
  <rect x="344" y="266" width="4" height="4" rx="1" fill="#34d399" opacity="0.4"/>

  <!-- Pressure plates on floor -->
  <!-- Plate 1 (child stands on this one) -->
  <rect x="190" y="388" width="60" height="12" rx="2" fill="#0c1e10" stroke="#10b981" stroke-width="1.5"/>
  <rect x="198" y="391" width="44" height="6" rx="1" fill="#10b981" opacity="0.3"/>
  <!-- Plate 2 -->
  <rect x="370" y="388" width="60" height="12" rx="2" fill="#0c1e10" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <!-- Plate 3 -->
  <rect x="550" y="388" width="60" height="12" rx="2" fill="#0c1e10" stroke="#10b981" stroke-width="1" opacity="0.3"/>

  <!-- CONNECTION lines from plates to cells -->
  <rect x="218" y="310" width="2" height="78" fill="#10b981" opacity="0.3"/>
  <rect x="398" y="310" width="2" height="78" fill="#10b981" opacity="0.1"/>

  <!-- CHILD silhouette (small, in corner, studying mechanism) -->
  <!-- Shadow -->
  <ellipse cx="175" cy="393" rx="20" ry="5" fill="#000" opacity="0.4"/>
  <!-- Legs -->
  <rect x="165" y="365" width="9" height="28" fill="#040c07"/>
  <rect x="177" y="365" width="9" height="28" fill="#040c07"/>
  <!-- Feet -->
  <rect x="162" y="389" width="13" height="6" rx="1" fill="#030908"/>
  <rect x="174" y="389" width="13" height="6" rx="1" fill="#030908"/>
  <!-- Body -->
  <rect x="160" y="312" width="34" height="56" rx="5" fill="#040c07"/>
  <!-- Hood/Head -->
  <ellipse cx="177" cy="303" rx="18" ry="20" fill="#040c07"/>
  <ellipse cx="177" cy="292" rx="20" ry="16" fill="#030a06"/>
  <!-- Arms (pointing at panel) -->
  <rect x="145" y="320" width="16" height="30" rx="4" fill="#040c07"/>
  <rect x="194" y="318" width="16" height="30" rx="4" fill="#040c07"/>
  <!-- Tiny hand touching panel -->
  <rect x="192" y="346" width="10" height="8" rx="2" fill="#030908"/>

  <!-- Ambient mist/particles -->
  <rect x="0" y="0" width="800" height="500" fill="#10b981" opacity="0.012"/>
</svg>
