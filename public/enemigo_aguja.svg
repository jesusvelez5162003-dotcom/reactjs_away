<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#020a05" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background - dark forest canopy -->
  <rect width="800" height="500" fill="#030a06"/>
  <rect width="800" height="500" fill="url(#bgGlow)"/>

  <!-- Trees in background -->
  <rect x="0" y="0" width="60" height="500" fill="#040c08"/>
  <rect x="55" y="0" width="40" height="500" fill="#051009"/>
  <rect x="700" y="0" width="60" height="500" fill="#040c08"/>
  <rect x="705" y="0" width="40" height="500" fill="#051009"/>
  <rect x="140" y="0" width="25" height="500" fill="#040c08" opacity="0.7"/>
  <rect x="630" y="0" width="25" height="500" fill="#040c08" opacity="0.7"/>

  <!-- Ceiling/top wood planks (industrial-nature) -->
  <rect x="0" y="0" width="800" height="40" fill="#050e08"/>
  <rect x="0" y="38" width="800" height="5" fill="#071409" opacity="0.8"/>
  <!-- Plank lines -->
  <rect x="0" y="0" width="800" height="40" fill="none" stroke="#040c07" stroke-width="0"/>
  <rect x="100" y="0" width="2" height="40" fill="#040c07" opacity="0.4"/>
  <rect x="250" y="0" width="2" height="40" fill="#040c07" opacity="0.4"/>
  <rect x="400" y="0" width="2" height="40" fill="#040c07" opacity="0.4"/>
  <rect x="550" y="0" width="2" height="40" fill="#040c07" opacity="0.4"/>
  <rect x="700" y="0" width="2" height="40" fill="#040c07" opacity="0.4"/>

  <!-- THE ACECHADOR AGUJA - Spider-like creature -->
  <!-- It clings to ceiling with needle legs -->

  <!-- LEGS (8 long, thin needle legs spreading from body) -->
  <!-- Left legs -->
  <line x1="400" y1="120" x2="120" y2="38" stroke="#0c2012" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="180" y2="15" stroke="#0c2012" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="240" y2="38" stroke="#0c2012" stroke-width="6" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="280" y2="28" stroke="#0c2012" stroke-width="4" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="400" y1="120" x2="680" y2="38" stroke="#0c2012" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="620" y2="15" stroke="#0c2012" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="560" y2="38" stroke="#0c2012" stroke-width="6" stroke-linecap="round"/>
  <line x1="400" y1="120" x2="520" y2="28" stroke="#0c2012" stroke-width="4" stroke-linecap="round"/>

  <!-- Leg joints (small circles at bends) -->
  <ellipse cx="260" cy="55" rx="6" ry="6" fill="#0f1e12"/>
  <ellipse cx="210" cy="30" rx="5" ry="5" fill="#0f1e12"/>
  <ellipse cx="320" cy="48" rx="5" ry="5" fill="#0f1e12"/>
  <ellipse cx="540" cy="55" rx="6" ry="6" fill="#0f1e12"/>
  <ellipse cx="590" cy="30" rx="5" ry="5" fill="#0f1e12"/>
  <ellipse cx="480" cy="48" rx="5" ry="5" fill="#0f1e12"/>

  <!-- Sharp needle tips (pixel dots at ends) -->
  <rect x="116" y="35" width="8" height="8" rx="1" fill="#10b981" opacity="0.3"/>
  <rect x="176" y="12" width="8" height="8" rx="1" fill="#10b981" opacity="0.25"/>
  <rect x="236" y="35" width="8" height="8" rx="1" fill="#10b981" opacity="0.3"/>
  <rect x="276" y="25" width="8" height="8" rx="1" fill="#10b981" opacity="0.25"/>
  <rect x="676" y="35" width="8" height="8" rx="1" fill="#10b981" opacity="0.3"/>
  <rect x="616" y="12" width="8" height="8" rx="1" fill="#10b981" opacity="0.25"/>
  <rect x="556" y="35" width="8" height="8" rx="1" fill="#10b981" opacity="0.3"/>
  <rect x="516" y="25" width="8" height="8" rx="1" fill="#10b981" opacity="0.25"/>

  <!-- BODY (egg-shaped, hanging from ceiling) -->
  <!-- Body glow -->
  <ellipse cx="400" cy="130" rx="70" ry="55" fill="#0c1e10" opacity="0.5" filter="url(#softBlur)"/>
  <!-- Exoskeleton body -->
  <ellipse cx="400" cy="140" rx="58" ry="46" fill="#0a1a0e"/>
  <!-- Body texture plates -->
  <ellipse cx="400" cy="132" rx="44" ry="34" fill="#0c1e12"/>
  <rect x="370" y="118" width="60" height="8" rx="3" fill="#0f2414" opacity="0.7"/>
  <rect x="374" y="128" width="52" height="6" rx="2" fill="#0f2414" opacity="0.5"/>
  <rect x="378" y="138" width="44" height="6" rx="2" fill="#0f2414" opacity="0.4"/>
  <!-- Belly segment lines -->
  <rect x="380" y="150" width="40" height="3" rx="1" fill="#0c1e12" opacity="0.6"/>
  <rect x="385" y="157" width="30" height="3" rx="1" fill="#0c1e12" opacity="0.4"/>

  <!-- EYES (the creature is blind, just has empty sockets) -->
  <!-- Left eye socket (empty, black) -->
  <ellipse cx="376" cy="128" rx="14" ry="10" fill="#050d07"/>
  <ellipse cx="376" cy="128" rx="10" ry="7" fill="#020605"/>
  <!-- Right eye socket (empty) -->
  <ellipse cx="424" cy="128" rx="14" ry="10" fill="#050d07"/>
  <ellipse cx="424" cy="128" rx="10" ry="7" fill="#020605"/>
  <!-- EAR/SENSOR appendages (this is how it hears) -->
  <rect x="342" y="112" width="3" height="28" fill="#0c1e12" opacity="0.8"/>
  <rect x="455" y="112" width="3" height="28" fill="#0c1e12" opacity="0.8"/>
  <ellipse cx="343" cy="108" rx="6" ry="6" fill="#0a1810"/>
  <ellipse cx="456" cy="108" rx="6" ry="6" fill="#0a1810"/>
  <!-- Sensor pulse -->
  <ellipse cx="343" cy="108" rx="4" ry="4" fill="#10b981" opacity="0.35" filter="url(#glow)"/>
  <ellipse cx="456" cy="108" rx="4" ry="4" fill="#10b981" opacity="0.35" filter="url(#glow)"/>

  <!-- Mandibles/mouth -->
  <rect x="385" y="178" width="8" height="16" rx="2" fill="#0a1810"/>
  <rect x="407" y="178" width="8" height="16" rx="2" fill="#0a1810"/>
  <!-- mandible tips (needles) -->
  <rect x="386" y="192" width="4" height="8" rx="1" fill="#10b981" opacity="0.4"/>
  <rect x="408" y="192" width="4" height="8" rx="1" fill="#10b981" opacity="0.4"/>

  <!-- Sound wave indicator (it's listening) -->
  <path d="M 340 200 Q 330 210 340 220" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  <path d="M 335 195 Q 320 210 335 225" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.2"/>
  <path d="M 460 200 Q 470 210 460 220" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  <path d="M 465 195 Q 480 210 465 225" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.2"/>

  <!-- Ground - dark floor below -->
  <rect x="0" y="420" width="800" height="80" fill="#030808"/>
  <!-- Ground pixel detail -->
  <rect x="0" y="420" width="800" height="3" fill="#050e09" opacity="0.7"/>

  <!-- Fallen leaves on ground (pixel style) -->
  <rect x="150" y="425" width="20" height="6" rx="3" fill="#050e08" opacity="0.8"/>
  <rect x="300" y="428" width="14" height="5" rx="2" fill="#050e08" opacity="0.6"/>
  <rect x="500" y="424" width="18" height="6" rx="3" fill="#050e08" opacity="0.7"/>
  <rect x="640" y="427" width="12" height="5" rx="2" fill="#050e08" opacity="0.6"/>

  <!-- Creature's shadow on ground -->
  <ellipse cx="400" cy="430" rx="90" ry="20" fill="#000" opacity="0.4" filter="url(#softBlur)"/>
</svg>
